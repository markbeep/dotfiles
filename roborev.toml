# Author for roborev-owned fix commits, formatted as Name <email>.
fix_commit_author = ''
# Co-authored-by trailers for roborev-owned fix commits, each formatted as Name <email>.
fix_commit_co_authored_by = []
disable_codex_sandbox = false
codex_cmd = 'codex'
claude_code_cmd = 'claude'
gemini_cmd = ''
cursor_cmd = 'agent'
pi_cmd = 'pi'
opencode_cmd = 'opencode'
anthropic_api_key = ''
# Filenames or glob patterns to exclude from review diffs globally.
exclude_patterns = []
default_max_prompt_size = 0
# Automatically close reviews that pass with no findings.
auto_close_passing_reviews = false
# Hide closed reviews by default in the TUI queue.
hide_closed_by_default = false
hide_addressed_by_default = false
# Automatically filter the TUI queue to the current repo.
auto_filter_repo = false
# Automatically filter the TUI queue to the current branch.
auto_filter_branch = false
# Show auto-design-review classifier rows (and skipped design rows) in the TUI queue. Off by default to reduce noise.
show_classify_jobs = false
# Enable mouse support in the TUI.
mouse_enabled = true
tab_width = 0
# Queue columns to hide in the TUI.
hidden_columns = []
# Show column borders in the TUI queue.
column_borders = false
# Custom queue column order in the TUI.
column_order = []
# Custom Tasks column order in the TUI.
task_column_order = []
column_config_version = 0

[sync]
enabled = false
postgres_url = ''
interval = ''
machine_name = ''
connect_timeout = ''

[ci]
enabled = false
poll_interval = ''
repos = []
exclude_repos = []
max_repos = 0
review_types = []
agents = []
throttle_interval = ''
throttle_bypass_users = ['wesm', 'mariusvniekerk']
model = ''
synthesis_agent = ''
synthesis_backup_agent = ''
synthesis_model = ''
min_severity = ''
panel = ''
discord_webhook_url = ''
upsert_comments = false
include_costs = false
batch_timeout = ''
github_app_id = 0
github_app_private_key = ''
github_app_installation_id = 0

[cost]
# HTTP usage endpoint template for cost/token lookup. Use {session_id}; set empty to use agentsview CLI lookup only.
endpoint = ''
# Timeout for HTTP usage endpoint lookups.
timeout = '10s'

[agent]
[agent.codex]
# Disable Codex skill instructions for review jobs.
disable_review_skills = true
# Pass --ignore-user-config to Codex for review jobs.
ignore_review_user_config = true

[agent.pi]
# Pi extension source for classifier JSON schema output.
jsonschemaextension = 'npm:@nqbao/pi-json-schema@0.1.1'

[auto_design_review]
# Enable the automatic design review decider. Off by default.
enabled = false
# Enable the automatic design review decider only for post-commit hook reviews. Off by default.
hook_enabled = false
# Diffs below this line count skip design review automatically.
min_diff_lines = 0
# Diffs at or above this line count trigger a design review automatically.
large_diff_lines = 0
# Commits touching at least this many files trigger a design review automatically.
large_file_count = 0
# Doublestar globs; any changed file matching triggers a design review.
trigger_paths = []
# Doublestar globs; a commit whose changed files all match is skipped.
skip_paths = []
# Regexes over the commit subject; a match triggers a design review.
trigger_message_patterns = []
# Regexes over the commit subject; a match skips the design review.
skip_message_patterns = []
# Per-classify-job timeout.
classifier_timeout_seconds = 0
# Cap on classifier prompt size in bytes.
classifier_max_prompt_size = 0

[review]
default_panel = ''
hook_review_panel = ''

[agent_hook]
# Stop hook threshold; 0 disables Stop-based prompting.
turn_threshold = 5
# PostToolUse commit threshold; 0 disables commit-based prompting.
commit_threshold = 0
# Open failed roborev review threshold; 0 disables review-based prompting.
failed_review_threshold = 4
# Instruction emitted when the agent hook decides a review/fix pass is needed.
instruction = 'Invoke the $roborev-fix skill now.'

[droid_hook]
# Stop hook threshold; 0 disables Stop-based prompting.
turn_threshold = 5
# PostToolUse commit threshold; 0 disables commit-based prompting.
commit_threshold = 0
# Open failed roborev review threshold; 0 disables review-based prompting.
failed_review_threshold = 4
# Instruction emitted when the Droid hook decides a review/fix pass is needed.
instruction = 'Run the roborev-fix skill to address the unresolved roborev findings, then continue.'

[kata_context]
# Kata task context in review prompts: off | current | open (default off).
mode = 'off'
# Max bytes of kata context to include (default 50000).
max_chars = 50000

[advanced]
# Enable the advanced Tasks workflow in the TUI.
tasks_enabled = false
