[helpers]

[default]
depends = [
    "aconfmgr",
    "atuin",
    "ecode",
    "fish",
    "git",
    "hister",
    "jj",
    "kitty",
    "kubectl",
    "nvim",
    "mise",
    "ssh",
    "starship",
    "zed",
]

# -----------------------
#
# Global
#
# -----------------------

[aconfmgr.files]
# aconfmgr breaks with recurse symlinks: https://github.com/SuperCuber/dotter/issues/176#issuecomment-2217954170
"dotfiles-private/aconfmgr/files" = { type = "symbolic", target = "~/.config/aconfmgr/files", recurse = false }
"aconfmgr/10-ignores.sh" = { type = "template", target = "~/.config/aconfmgr/10-ignores.sh", prepend = "# Generated by dotter. Do not edit directly.\n" }
"aconfmgr/20-endeavour.sh" = { type = "template", target = "~/.config/aconfmgr/20-endeavour.sh", prepend = "# Generated by dotter. Do not edit directly.\n" }
"aconfmgr/25-base-theming.sh" = { type = "template", target = "~/.config/aconfmgr/25-base-theming.sh", prepend = "# Generated by dotter. Do not edit directly.\n" }
"aconfmgr/30-base-modules.sh" = { type = "template", target = "~/.config/aconfmgr/30-base-modules.sh", prepend = "# Generated by dotter. Do not edit directly.\n" }
"aconfmgr/31-non-essentials-modules.sh" = { type = "template", target = "~/.config/aconfmgr/31-non-essentials-modules.sh", prepend = "# Generated by dotter. Do not edit directly.\n" }
"aconfmgr/32-gaming.sh" = { type = "template", target = "~/.config/aconfmgr/32-gaming.sh", prepend = "# Generated by dotter. Do not edit directly.\n" }
"aconfmgr/34-association-apps.sh" = { type = "template", target = "~/.config/aconfmgr/34-association-apps.sh", prepend = "# Generated by dotter. Do not edit directly.\n" }
"aconfmgr/35-course-modules.sh" = { type = "template", target = "~/.config/aconfmgr/35-course-modules.sh", prepend = "# Generated by dotter. Do not edit directly.\n" }
"aconfmgr/40-base-files.sh" = { type = "template", target = "~/.config/aconfmgr/40-base-files.sh", prepend = "# Generated by dotter. Do not edit directly.\n" }

[atuin.files]
"atuin.toml" = "~/.config/atuin/config.toml"

[ecode.files]
"ecode.toml" = "~/.config/ecode/config.toml"

[fish.files]
fish = { type = "symbolic", target = "~/.config/fish", recurse = false }
"dotfiles-private/fish/conf.d/discord.fish" = "~/.config/fish/conf.d/discord.fish"

[git.files]
gitconfig = "~/.gitconfig"
"dotfiles-private/gitconfig.user" = "~/.gitconfig.user"

[hister.files]
"dotfiles-private/hister.yml" = "~/.config/hister/config.yml"

[jj.files]
jj = { type = "symbolic", target = "~/.config/jj", recurse = false }
"dotfiles-private/jj/conf.d/user.toml" = "~/.config/jj/conf.d/user.toml"

[kitty.files]
kitty = "~/.config/kitty"

[kubectl.files]
"dotfiles-private/kube" = "~/.kube/config"

[nvim.files]
nvim = "~/.config/nvim"

[mise.files]
"mise.config.toml" = "~/.config/mise/mise.toml"

[ssh.files]
"dotfiles-private/ssh" = "~/.ssh/config"

[starship.files]
"starship.toml" = "~/.config/starship.toml"

[zed.files]
zed = "~/.config/zed"

# -----------------------
#
# Host-specific
#
# -----------------------

[niri.files]
niri = "~/.config/niri"

[dms.files]
DankMaterialShell = { type = "symbolic", target = "~/.config/DankMaterialShell", recurse = false }
"dotfiles-private/DankMaterialShell/plugin_settings.json" = "~/.config/DankMaterialShell/plugin_settings.json"

[legendary.files]
"legendary.ini" = "~/.config/legendary/config.ini"

[plasma.files]
"plasma/ssh-auth.sh" = "~/.config/plasma-workspace/env/ssh-auth.sh"

[settings]
default_target_type = "automatic"
